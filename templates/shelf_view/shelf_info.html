<div class="shelf-view">
    <p>
        <b>{{ shelf_name }}</b>
    </p>
    <p>
        Kirjojen lukumäärä: {{ number_of_books }}
    </p>
    <p>
        Kuvaus: {{ description }}
    </p>
    <p>
        <div class="normal-button">
            <a href="/{{ username }}/{{ shelf_name }}/uusi-kirja" title="Lisää kirja" id="add-book-button">
            Lisää uusi kirja
        </a>
        </div>
        
    </p>
    <p>
        <div class="normal-button">
            <a href="/{{ username }}/hyllyt/1" title="takaisin" id="back-to-shelves-view-button">
            Takaisin
        </a>
        </div>
    </p>
    
    
    <p>
        {% if add_book_message %}
        {{ add_book_message }}
        {% endif %}
    </p>
</div>
